<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TaskBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo-icon">⚡</span>
        <span class="auth-logo-text">TaskBoard</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your collaborative workspace</p>

      {% if form.errors %}
      <div class="auth-error">
        Invalid credentials. Please try again.
      </div>
      {% endif %}

      <form method="post" id="login-form" class="auth-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <div class="form-group">
          <label class="form-label" for="id_username">Username</label>
          <input
            type="text"
            id="id_username"
            name="username"
            class="form-input"
            placeholder="Enter your username"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="id_password">Password</label>
          <input
            type="password"
            id="id_password"
            name="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Sign In
        </button>
      </form>

      <div class="auth-hint">
        <p>Demo credentials:</p>
        <code>user1 / password123</code>
        <br/>
        <code>user2 / password123</code>
      </div>
    </div>
  </div>
</body>
</html>
